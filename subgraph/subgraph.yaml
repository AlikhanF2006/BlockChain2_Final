# Query 1: Recent swaps for a pool
# { swaps(where: { pool: "0x..." }, orderBy: timestamp, orderDirection: desc, first: 20) { sender tokenIn amountIn amountOut timestamp } }
#
# Query 2: All active proposals
# { proposals(where: { state: "Active" }, orderBy: createdAtTimestamp, orderDirection: desc) { id description forVotes againstVotes endBlock } }
#
# Query 3: User's loan position and health factor
# { loanPosition(id: "0x...") { borrower collateralAmount debtAmount healthFactor lastUpdatedTimestamp } }
#
# Query 4: Pool TVL and volume
# { pool(id: "0x...") { reserveA reserveB totalLiquidityUSD totalVolumeUSD txCount } }
#
# Query 5: Voting history for a proposal
# { proposal(id: "1") { votes(orderBy: timestamp, orderDirection: desc) { voter support weight reason } } }

specVersion: 0.0.7
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: AMMPool
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000001"
      abi: AMMPool
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
        - Swap
      abis:
        - name: AMMPool
          file: ./abis/AMMPool.json
      eventHandlers:
        - event: LiquidityAdded(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityRemoved
        - event: Swap(indexed address,indexed address,uint256,uint256,indexed address)
          handler: handleSwap
        - event: Sync(uint112,uint112)
          handler: handleSync
      file: ./src/amm-pool.ts
  - kind: ethereum
    name: LendingPool
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000002"
      abi: LendingPool
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - LoanPosition
        - BorrowEvent
      abis:
        - name: LendingPool
          file: ./abis/LendingPool.json
      eventHandlers:
        - event: Deposit(indexed address,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,uint256)
          handler: handleWithdraw
        - event: CollateralDeposited(indexed address,uint256)
          handler: handleCollateralDeposited
        - event: CollateralWithdrawn(indexed address,uint256)
          handler: handleCollateralWithdrawn
        - event: Borrow(indexed address,uint256)
          handler: handleBorrow
        - event: Repay(indexed address,uint256)
          handler: handleRepay
        - event: Liquidation(indexed address,indexed address,uint256,uint256)
          handler: handleLiquidation
      file: ./src/lending-pool.ts
  - kind: ethereum
    name: YieldVault
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000003"
      abi: YieldVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - LoanPosition
      abis:
        - name: YieldVault
          file: ./abis/YieldVault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleVaultDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleVaultWithdraw
      file: ./src/vault.ts
  - kind: ethereum
    name: DeFiGovernor
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000004"
      abi: DeFiGovernor
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Proposal
        - Vote
      abis:
        - name: DeFiGovernor
          file: ./abis/DeFiGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,indexed address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
      file: ./src/governance.ts
