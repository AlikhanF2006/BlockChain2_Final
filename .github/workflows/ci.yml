name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build
        run: forge build

      - name: Test
        run: forge test -vvv
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Generate LCOV
        run: forge coverage --ir-minimum --report lcov
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}

      - name: Enforce 90 percent src coverage
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const text = fs.readFileSync('lcov.info', 'utf8');

          let hit = 0;
          let found = 0;

          for (const section of text.split('end_of_record')) {
            const sf = section.match(/SF:(.*)/);
            if (!sf) continue;

            const file = sf[1].replace(/\\/g, '/');

            if (!file.includes('/src/') && !file.startsWith('src/')) {
              continue;
            }

            for (const line of section.split(/\r?\n/)) {
              if (line.startsWith('LH:')) hit += Number(line.slice(3));
              if (line.startsWith('LF:')) found += Number(line.slice(3));
            }
          }

          const pct = found === 0 ? 100 : (hit / found) * 100;
          console.log(`src line coverage = ${pct.toFixed(2)}% (${hit}/${found})`);

          if (pct < 90) {
            console.error('Coverage below 90% for src contracts');
            process.exit(1);
          }
          NODE

  slither:
    name: Slither
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install Slither
        run: pipx install slither-analyzer

      - name: Run Slither
        run: slither . --filter-paths "lib|test|script" --exclude-low --exclude-informational

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Lint Solidity
        run: forge fmt --check

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  subgraph:
    name: Subgraph Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: subgraph/package-lock.json

      - name: Install subgraph dependencies
        working-directory: subgraph
        run: npm install

      - name: Generate subgraph types
        working-directory: subgraph
        run: npm run codegen

      - name: Build subgraph
        working-directory: subgraph
        run: npm run build